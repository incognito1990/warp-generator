name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify server starts
        run: |
          timeout 5 node server.mjs &
          sleep 2
          curl -sf http://localhost:3000/ | grep -q "WARP"
          curl -sf -X POST http://localhost:3000/api/calc \
            -H 'Content-Type: application/json' \
            -d '{"include":["0.0.0.0/0"],"ipv6":true}' \
            | grep -q "allowedIps"
